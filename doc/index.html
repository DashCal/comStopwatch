<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch 秒表 | v0.0.1 | Localwu</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0f0f0f;
            --panel: #1a1a1a;
            --border: #2a2a2a;
            --text: #e0e0e0;
            --text-muted: #666;
            --accent: #00d4aa;
            --accent-dim: #00d4aa20;
            --letter: #4fc3f7;
            --letter-dim: #4fc3f720;
        }

        body {
            font-family: 'IBM Plex Mono', 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 头部区域 */
        header {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .brand {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .time-display {
            font-size: 32px;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--text);
        }

        .time-display .date {
            color: var(--text-muted);
            font-size: 14px;
            margin-left: 16px;
            font-weight: 400;
        }

        /* 统计面板 */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1px;
            background: var(--border);
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .stat {
            background: var(--panel);
            padding: 24px;
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 300;
            color: var(--text);
            line-height: 1;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat.letters .stat-value { color: var(--letter); }
        .stat.spaces .stat-value { color: var(--accent); }

        /* 控制栏 */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .section-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px 20px;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* 记录表格 */
        .records-wrap {
            background: var(--panel);
            border: 1px solid var(--border);
        }

        .records-header {
            display: grid;
            grid-template-columns: 80px 100px 1fr 200px;
            gap: 20px;
            padding: 16px 24px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .record-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .record {
            display: grid;
            grid-template-columns: 80px 100px 1fr 200px;
            gap: 20px;
            padding: 12px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .record:hover {
            background: var(--bg);
        }

        .record:last-child {
            border-bottom: none;
        }

        .col-index {
            color: var(--text-muted);
        }

        .col-key {
            font-weight: 600;
        }

        .col-key.letter {
            color: var(--letter);
        }

        .col-key.space {
            color: var(--accent);
            font-style: italic;
        }

        .col-time {
            color: var(--text-muted);
        }

        .col-full {
            color: var(--text);
            font-family: inherit;
        }

        /* 状态指示 */
        .status {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 12px 24px;
            background: var(--panel);
            border: 1px solid var(--border);
            font-size: 12px;
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .status.active {
            opacity: 1;
            border-color: var(--accent);
            color: var(--accent);
        }

        .status.active.letter {
            border-color: var(--letter);
            color: var(--letter);
        }

        /* 空状态 */
        .empty {
            padding: 60px;
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        /* 滚动条 */
        .record-list::-webkit-scrollbar {
            width: 6px;
        }

        .record-list::-webkit-scrollbar-track {
            background: var(--panel);
        }

        .record-list::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        .record-list::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        /* 提示 */
        .hint {
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            letter-spacing: 1px;
        }

        .hint span {
            color: var(--text);
            margin: 0 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand">Stopwatch v0.0.1</div>
            <div class="time-display">
                <span id="clock">00:00:00</span>
                <span class="date" id="date">0000-00-00</span>
            </div>
        </header>

        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="total">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat letters">
                <div class="stat-value" id="letters">0</div>
                <div class="stat-label">Letters</div>
            </div>
            <div class="stat spaces">
                <div class="stat-value" id="spaces">0</div>
                <div class="stat-label">Spaces</div>
            </div>
        </div>

        <div class="toolbar">
            <div class="section-title">Event Log</div>
            <button class="btn" onclick="clearAll()">Clear Log</button>
        </div>

        <div class="records-wrap">
            <div class="records-header">
                <div>#</div>
                <div>Key</div>
                <div>Timestamp</div>
                <div>Exact Time</div>
            </div>
            <div class="record-list" id="list">
                <div class="empty" id="empty">Press any letter or space to begin</div>
            </div>
        </div>

        <div class="hint">
            Valid keys: <span>A-Z</span> <span>a-z</span> <span>Space</span>
        </div>
    </div>

    <div class="status" id="status">Ready</div>

    <script>
        // State
        const state = {
            count: 0,
            letters: 0,
            spaces: 0,
            records: []
        };

        // Elements
        const els = {
            clock: document.getElementById('clock'),
            date: document.getElementById('date'),
            total: document.getElementById('total'),
            letters: document.getElementById('letters'),
            spaces: document.getElementById('spaces'),
            list: document.getElementById('list'),
            empty: document.getElementById('empty'),
            status: document.getElementById('status')
        };

        // Clock update (seconds only, no ms)
        function updateClock() {
            const now = new Date();
            els.clock.textContent = now.toLocaleTimeString('en-US', { 
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            els.date.textContent = now.toLocaleDateString('en-CA'); // ISO format
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Format precise time for records (with ms)
        function formatPrecise(date) {
            const iso = date.toISOString(); // 2024-01-15T10:30:45.123Z
            return {
                time: iso.slice(11, 19),     // 10:30:45
                ms: iso.slice(20, 23),       // 123
                full: iso.replace('T', ' ').replace('Z', '').slice(0, 23)
            };
        }

        // Add record
        function log(key, isSpace) {
            const now = new Date();
            const precise = formatPrecise(now);
            
            // Update counts
            state.count++;
            isSpace ? state.spaces++ : state.letters++;
            
            // Update stats
            els.total.textContent = state.count;
            els.letters.textContent = state.letters;
            els.spaces.textContent = state.spaces;
            
            // Create record
            const record = {
                id: state.count,
                key: isSpace ? 'Space' : key.toUpperCase(),
                isSpace: isSpace,
                time: precise.time,
                ms: precise.ms,
                full: precise.full
            };
            state.records.unshift(record);
            
            // Render
            render(record);
            showStatus(key, isSpace);
        }

        // Render single record
        function render(r) {
            if (state.count === 1) {
                els.empty.remove();
            }
            
            const div = document.createElement('div');
            div.className = 'record';
            div.innerHTML = `
                <div class="col-index">${r.id.toString().padStart(3, '0')}</div>
                <div class="col-key ${r.isSpace ? 'space' : 'letter'}">${r.key}</div>
                <div class="col-time">${r.time}<span style="color:var(--text-muted)">.${r.ms}</span></div>
                <div class="col-full">${r.full}</div>
            `;
            
            els.list.insertBefore(div, els.list.firstChild);
            
            // Limit to 50 records for performance
            if (els.list.children.length > 50) {
                els.list.removeChild(els.list.lastChild);
            }
        }

        // Status feedback
        function showStatus(key, isSpace) {
            els.status.textContent = `Captured: ${isSpace ? 'Space' : key.toUpperCase()}`;
            els.status.className = 'status active' + (isSpace ? '' : ' letter');
            
            setTimeout(() => {
                els.status.className = 'status';
                els.status.textContent = 'Ready';
            }, 300);
        }

        // Clear all
        function clearAll() {
            state.count = 0;
            state.letters = 0;
            state.spaces = 0;
            state.records = [];
            
            els.total.textContent = '0';
            els.letters.textContent = '0';
            els.spaces.textContent = '0';
            
            els.list.innerHTML = '<div class="empty" id="empty">Press any letter or space to begin</div>';
            els.empty = document.getElementById('empty');
            
            els.status.textContent = 'Cleared';
            els.status.className = 'status active';
            setTimeout(() => {
                els.status.className = 'status';
                els.status.textContent = 'Ready';
            }, 300);
        }

        // Keyboard handler
        document.addEventListener('keydown', e => {
            // Ignore if typing in input
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            
            const key = e.key;
            
            // Space
            if (key === ' ') {
                e.preventDefault();
                log('Space', true);
                return;
            }
            
            // Letters only (a-z, A-Z)
            if (key.length === 1 && /[a-zA-Z]/.test(key)) {
                log(key, false);
            }
        });

        // Prevent space scroll
        window.addEventListener('keydown', e => {
            if (e.key === ' ' && e.target === document.body) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
