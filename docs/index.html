<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch 秒表 | v-.-.- | Localwu</title>
    <style>
        body {
            background: #f7f7f7;
        }

        .container.scaled {
            transform: scale(.01);
        }
    </style>
    <link rel="stylesheet" href="./style/index/page.css">
    <link rel="stylesheet" href="./style/font/ibm-plex-mono.css">
</head>

<body>
    <div class="container scaled">
        <header>
            <div class="top">
                <div class="time-bar">
                    <b class="brand">STOPWATCH <span class="clock" id="clock">--:--:--</span></b>

                    <span class="date brand" id="date">----------</span>
                </div>
                <!-- by <a href="https://localwu.com" style="font-family: 'IBM Plex Math'; font-style: italic;">Localwu</a> -->
                <div class="menu">
                    <div class="more">...</div>
                    <div class="pop-menu" style="display: none;">
                        <span>Language/语言</span>
                        <span>Setting</span>
                        <span>About</span>
                    </div>
                </div>
            </div>
            <!-- <div class="time-display">
                <span class="clock" id="clock">--:--:--</span>
                <span class="date" id="date">----------</span>
            </div> -->
        </header>

        <main>
            <section class="stopwatch">

                <div class="stopwatch-time-display">
                    <span class="stopwatch-time" id="stopwatch-time">00:00:00</span>
                    <div class="time-ctrl">
                        <button class="btn" onclick="clearAll()">Start</button>
                        <button class="btn" onclick="clearAll()">Stop</button>
                    </div>

                </div>

                <div class="toolbar">
                    <div class="section-title">Event Log</div>
                    <button class="btn" onclick="clearAll()">Clear Log</button>
                </div>


                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="total">0</div>
                        <div class="stat-label">Total</div>
                    </div>
                    <div class="stat letters">
                        <div class="stat-value" id="letters">0</div>
                        <div class="stat-label">Letter(s)</div>
                    </div>
                    <div class="stat spaces">
                        <div class="stat-value" id="spaces">0</div>
                        <div class="stat-label">Space(s)</div>
                    </div>
                    <div class="stat spaces">
                        <div class="stat-value" id="clicks">0</div>
                        <div class="stat-label">Click(s)</div>
                    </div>
                    <div class="stat spaces">
                        <div class="stat-value" id="touches">0</div>
                        <div class="stat-label">Touch(es)</div>
                    </div>
                    <div class="stat spaces">
                        <div class="stat-value" id="nibs">0</div>
                        <div class="stat-label">Nib(s)</div>
                    </div>
                </div>

                <div class="records-wrap">
                    <div class="records-header">
                        <div>#</div>
                        <div>Key</div>
                        <div>Timestamp</div>
                    </div>
                    <div class="record-list" id="list">
                        <div class="empty" id="empty">Press any letter or space to begin</div>
                    </div>
                </div>

                <div class="hint">
                    Start & log: <span>A-Z</span> <span>a-z</span> <span>Space</span> <br>
                    Stop: <span>Ctrl</span>+<span>A-Z</span>/<span>a-z</span>/<span>Space</span>

                </div>
                <!-- <div class="copyright">
            © 2026 <a href="https://stopwatch.localwu.com">Stopwatch</a> by <a href="https://localwu.com">Localwu</a>.
            All Rights Reserved.
        </div> -->
            </section>

        </main>

        <ribbon>
            <span>Times</span>
            <span>Globe</span>
            <span class="active">Stopwatch</span>
            <span>Alarm</span>
            <span>Timer</span>
        </ribbon>

    </div>

    <div class="status" id="status">Ready</div>

    <script src="./script/index/page.js"></script>
    <script src="./script/index/stopwatch.js"></script>
    <link rel="stylesheet" href="./style/public/cancel-scale.css">
</body>

</html>
